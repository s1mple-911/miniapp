<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ombor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700&display=swap');
  :root {
    --bg: #0d0f14; --bg2: #151820; --bg3: #1c2030; --card: #1e2232;
    --border: #2a2f45; --accent: #4f8ef7; --accent2: #38d9a9;
    --danger: #ff6b6b; --warn: #ffd43b; --text: #e8eaf0; --muted: #6b7280;
    --radius: 14px; --green: #22c55e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Rubik', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* HEADER */
  .header {
    background: var(--bg2); border-bottom: 1px solid var(--border);
    padding: 12px 16px; display: flex; align-items: center; gap: 10px;
    position: sticky; top: 0; z-index: 100;
  }
  .header-icon { width: 34px; height: 34px; background: linear-gradient(135deg, var(--accent), #7c3aed); border-radius: 10px; display: flex; align-items: center; justify-content: center; }
  .header-title { font-size: 16px; font-weight: 600; }
  .header-sub { font-size: 11px; color: var(--muted); }
  .header-brand { margin-left: auto; background: var(--green); color: #fff; font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 20px; letter-spacing: 0.5px; }

  /* TABS */
  .tabs { display: grid; grid-template-columns: 1fr 1fr 1fr; background: var(--bg2); border-bottom: 1px solid var(--border); }
  .tab { padding: 10px 8px; text-align: center; font-size: 12px; font-weight: 500; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-icon { font-size: 16px; display: block; margin-bottom: 2px; }

  /* PAGES */
  .page { display: none; padding: 14px; }
  .page.active { display: block; }

  /* OSHPAZ SELECT */
  .oshpaz-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 16px; }
  .oshpaz-btn { background: var(--bg3); border: 1.5px solid var(--border); border-radius: 12px; padding: 10px 6px; text-align: center; cursor: pointer; transition: all 0.15s; }
  .oshpaz-btn.selected { border-color: var(--accent); background: rgba(79,142,247,0.12); }
  .oshpaz-avatar { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg, #3b4fd4, #7c3aed); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; margin: 0 auto 5px; color: #c4b5fd; }
  .oshpaz-name { font-size: 11px; font-weight: 500; }
  .oshpaz-type { font-size: 10px; color: var(--muted); }

  /* ADD FORM */
  .add-form { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 12px; }
  .add-form-title { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
  .form-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
  .form-select {
    flex: 1; background: var(--bg3); border: 1px solid var(--border); border-radius: 10px;
    color: var(--text); padding: 10px 12px; font-family: 'Rubik', sans-serif; font-size: 13px;
  }
  .form-input {
    width: 80px; background: var(--bg3); border: 1px solid var(--border); border-radius: 10px;
    color: var(--text); padding: 10px 12px; font-family: 'Rubik', sans-serif; font-size: 13px; text-align: center;
  }
  .form-input:focus, .form-select:focus { outline: none; border-color: var(--accent); }
  .add-btn {
    background: var(--accent); color: #fff; border: none; border-radius: 10px;
    padding: 10px 16px; font-family: 'Rubik', sans-serif; font-size: 13px; font-weight: 600;
    cursor: pointer; white-space: nowrap;
  }
  .add-btn:active { opacity: 0.8; }

  /* BASKET */
  .basket { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 12px; }
  .basket-title { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
  .basket-clear { font-size: 11px; color: var(--danger); cursor: pointer; text-transform: none; font-weight: 500; }
  .basket-empty { font-size: 13px; color: var(--muted); text-align: center; padding: 10px 0; }
  .basket-item { display: flex; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); gap: 8px; }
  .basket-item:last-child { border-bottom: none; }
  .basket-item-name { flex: 1; font-size: 13px; }
  .basket-item-qty { font-size: 13px; font-weight: 600; color: var(--accent2); }
  .basket-item-unit { font-size: 11px; color: var(--muted); min-width: 24px; }
  .basket-item-del { color: var(--danger); cursor: pointer; font-size: 16px; padding: 0 4px; }

  /* BUTTONS */
  .btn { width: 100%; padding: 13px; border-radius: var(--radius); font-family: 'Rubik', sans-serif; font-size: 15px; font-weight: 600; border: none; cursor: pointer; transition: all 0.15s; margin-bottom: 8px; }
  .btn:active { transform: scale(0.98); }
  .btn-primary { background: linear-gradient(135deg, var(--accent), #7c3aed); color: #fff; }
  .btn-secondary { background: var(--bg3); color: var(--muted); border: 1px solid var(--border); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* OMBOR PAGE */
  .filter-row { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  .filter-chip { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: var(--bg3); color: var(--muted); transition: all 0.15s; }
  .filter-chip.active { background: rgba(79,142,247,0.15); border-color: var(--accent); color: var(--accent); }
  .ombor-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 10px 14px; margin-bottom: 8px; }
  .ombor-header { font-size: 12px; font-weight: 600; color: var(--accent); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.4px; }
  .ombor-item { display: flex; align-items: center; padding: 7px 0; border-bottom: 1px solid var(--border); gap: 8px; }
  .ombor-item:last-child { border-bottom: none; }
  .ombor-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .dot-ok { background: var(--accent2); } .dot-warn { background: var(--warn); } .dot-danger { background: var(--danger); }
  .ombor-name { flex: 1; font-size: 13px; }
  .ombor-qty { font-size: 14px; font-weight: 700; color: var(--accent2); }
  .ombor-unit { font-size: 11px; color: var(--muted); margin-left: 3px; }

  /* TARIXI */
  .tarixi-filters { display: flex; gap: 8px; margin-bottom: 12px; }
  .tarixi-filters select { flex: 1; background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; color: var(--text); padding: 8px 12px; font-family: 'Rubik', sans-serif; font-size: 12px; }
  .tarixi-item { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; }
  .tarixi-head { display: flex; justify-content: space-between; margin-bottom: 6px; }
  .tarixi-oshpaz { font-size: 13px; font-weight: 600; color: var(--accent); }
  .tarixi-sana { font-size: 11px; color: var(--muted); }
  .tarixi-hodim { font-size: 11px; color: var(--muted); margin-bottom: 8px; }
  .tarixi-chips { display: flex; flex-wrap: wrap; gap: 5px; }
  .tarixi-chip { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 3px 8px; font-size: 11px; }

  /* LOADING */
  .loading { text-align: center; padding: 32px 16px; color: var(--muted); font-size: 13px; }
  .spinner { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* TOAST */
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 10px 18px; font-size: 13px; font-weight: 500; z-index: 999; transition: transform 0.3s; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--accent2); color: var(--accent2); }
  .toast.error { border-color: var(--danger); color: var(--danger); }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M20 7H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
  </div>
  <div>
    <div class="header-title">Ombor</div>
    <div class="header-sub" id="headerSub">Yuklanmoqda...</div>
  </div>
  <div class="header-brand">AROS</div>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('krim',this)"><span class="tab-icon">📦</span>Krim</div>
  <div class="tab" onclick="showTab('ombor',this)"><span class="tab-icon">📊</span>Ombor</div>
  <div class="tab" onclick="showTab('tarixi',this)"><span class="tab-icon">📋</span>Tarixi</div>
</div>

<!-- KRIM PAGE -->
<div id="page-krim" class="page active">
  <div style="font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">Oshpazni tanlang</div>
  <div class="oshpaz-grid" id="oshpazGrid">
    <div class="loading"><div class="spinner"></div></div>
  </div>

  <div id="krimForm" style="display:none">
    <div class="add-form">
      <div class="add-form-title">Mahsulot qo'shish</div>
      <div class="form-row">
        <select class="form-select" id="selMahsulot">
          <option value="">Mahsulot tanlang</option>
        </select>
      </div>
      <div class="form-row">
        <input class="form-input" id="inputMiqdor" type="number" min="0" step="0.1" placeholder="Miqdor">
        <select class="form-select" id="selBirlik" style="max-width:100px">
          <option value="kg">kg</option>
          <option value="litr">litr</option>
          <option value="dona">dona</option>
          <option value="g">g</option>
          <option value="ml">ml</option>
          <option value="paket">paket</option>
          <option value="qop">qop</option>
        </select>
        <button class="add-btn" onclick="addToBasket()">+ Qo'sh</button>
      </div>
    </div>

    <div class="basket">
      <div class="basket-title">
        <span>Savatcha <span id="basketCount" style="color:var(--accent)">(0)</span></span>
        <span class="basket-clear" onclick="clearBasket()">Tozalash</span>
      </div>
      <div id="basketList"><div class="basket-empty">Hali mahsulot qo'shilmadi</div></div>
    </div>

    <button class="btn btn-primary" id="savBtn" onclick="saveKrim()" disabled>✅ Tasdiqlash va saqlash</button>
    <button class="btn btn-secondary" onclick="resetKrim()">Bekor qilish</button>
  </div>
</div>

<!-- OMBOR PAGE -->
<div id="page-ombor" class="page">
  <div class="filter-row" id="omborFilter">
    <div class="filter-chip active" onclick="filterOmbor(null,this)">Hammasi</div>
  </div>
  <div id="omborList"><div class="loading"><div class="spinner"></div>Yuklanmoqda...</div></div>
</div>

<!-- TARIXI PAGE -->
<div id="page-tarixi" class="page">
  <div class="tarixi-filters">
    <select id="tarixiOshpaz" onchange="loadTarixi()"><option value="">Barcha oshpazlar</option></select>
    <select id="tarixiSana" onchange="loadTarixi()"><option value="">Barcha sanalar</option></select>
  </div>
  <div id="tarixiList"><div class="loading"><div class="spinner"></div>Yuklanmoqda...</div></div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = {
  oshpazlar: 'https://simle.app.n8n.cloud/webhook/11f388db-4203-4a2a-ab05-01b8e8e2de3d',
  mahsulotlar: 'https://simle.app.n8n.cloud/webhook/02963f22-de91-4a1b-94bf-78817787d494',
  holat: 'https://simle.app.n8n.cloud/webhook/145e3667-3091-4554-8fba-f797741f5851',
  krim: 'https://simle.app.n8n.cloud/webhook/b5bf9585-cde0-4fe7-bc73-41666feda797',
  tarixi: 'https://simle.app.n8n.cloud/webhook/66c333f9-cbce-4b68-a76d-993ec2f2a734'
};

const HODIM_ID = 'inventory_user';

let oshpazlar = [], mahsulotlar = [], selOshpaz = null, basket = [];
let omborData = [], omborFilter = null;

function parseResp(data) { return Array.isArray(data) ? data[0] : data; }

// TABS
function showTab(tab, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + tab).classList.add('active');
  el.classList.add('active');
  if (tab === 'ombor') loadOmbor();
  if (tab === 'tarixi') loadTarixiInit();
}

// INIT
async function init() {
  try {
    const [o, m] = await Promise.all([
      fetch(API.oshpazlar).then(r => r.json()),
      fetch(API.mahsulotlar).then(r => r.json())
    ]);
    oshpazlar = parseResp(o).oshpazlar || [];
    mahsulotlar = parseResp(m).mahsulotlar || [];
    document.getElementById('headerSub').textContent = oshpazlar.length + ' oshpaz • ' + mahsulotlar.length + ' mahsulot';
    renderOshpazlar();
    fillMahsulotSelect();
  } catch(e) {
    document.getElementById('headerSub').textContent = 'Xato!';
    showToast('Server bilan aloqa yo\'q', 'error');
  }
}

// KRIM
function renderOshpazlar() {
  const grid = document.getElementById('oshpazGrid');
  if (!oshpazlar.length) { grid.innerHTML = '<div style="color:var(--muted);font-size:13px;grid-column:span 3">Oshpazlar topilmadi</div>'; return; }
  grid.innerHTML = oshpazlar.map(o => {
    const initials = o.ism.split(' ').map(w=>w[0]||'').join('').substring(0,2).toUpperCase();
    return `<div class="oshpaz-btn" onclick="selectOshpaz('${o.id}','${o.ism.replace(/'/g,"\\'")}','${o.type}',this)">
      <div class="oshpaz-avatar">${initials}</div>
      <div class="oshpaz-name">${o.ism.split(' ')[0]}</div>
      <div class="oshpaz-type">${o.type}</div>
    </div>`;
  }).join('');
}

function fillMahsulotSelect() {
  const sel = document.getElementById('selMahsulot');
  sel.innerHTML = '<option value="">Mahsulot tanlang</option>' +
    mahsulotlar.map(m => `<option value="${m.mahsulot}" data-birlik="${m.birlik||''}">${m.mahsulot}</option>`).join('');
  sel.onchange = function() {
    const opt = sel.options[sel.selectedIndex];
    const birlik = opt.dataset.birlik || '';
    const birlikSel = document.getElementById('selBirlik');
    // Default birlikni o'rnatish
    for (let i = 0; i < birlikSel.options.length; i++) {
      if (birlikSel.options[i].value === birlik) {
        birlikSel.selectedIndex = i; break;
      }
    }
  };
}

function selectOshpaz(id, ism, type, el) {
  document.querySelectorAll('.oshpaz-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  selOshpaz = { id, ism, type };
  basket = [];
  renderBasket();
  document.getElementById('krimForm').style.display = 'block';
}

function addToBasket() {
  const mahsulot = document.getElementById('selMahsulot').value;
  const miqdor = parseFloat(document.getElementById('inputMiqdor').value);
  const birlik = document.getElementById('selBirlik').value;
  if (!mahsulot) { showToast('Mahsulot tanlang', 'error'); return; }
  if (!miqdor || miqdor <= 0) { showToast('Miqdor kiriting', 'error'); return; }
  // Mavjud bo'lsa yangilash
  const idx = basket.findIndex(b => b.mahsulot === mahsulot && b.birlik === birlik);
  if (idx >= 0) { basket[idx].miqdor += miqdor; }
  else { basket.push({ mahsulot, miqdor, birlik }); }
  document.getElementById('selMahsulot').value = '';
  document.getElementById('inputMiqdor').value = '';
  renderBasket();
}

function removeFromBasket(idx) {
  basket.splice(idx, 1);
  renderBasket();
}

function clearBasket() { basket = []; renderBasket(); }

function renderBasket() {
  const list = document.getElementById('basketList');
  document.getElementById('basketCount').textContent = '(' + basket.length + ')';
  document.getElementById('savBtn').disabled = basket.length === 0;
  if (!basket.length) { list.innerHTML = '<div class="basket-empty">Hali mahsulot qo\'shilmadi</div>'; return; }
  list.innerHTML = basket.map((b, i) => `
    <div class="basket-item">
      <div class="basket-item-name">${b.mahsulot}</div>
      <div class="basket-item-qty">${b.miqdor}</div>
      <div class="basket-item-unit">${b.birlik}</div>
      <div class="basket-item-del" onclick="removeFromBasket(${i})">✕</div>
    </div>
  `).join('');
}

async function saveKrim() {
  if (!selOshpaz || !basket.length) return;
  document.getElementById('savBtn').disabled = true;
  document.getElementById('savBtn').textContent = 'Saqlanmoqda...';
  try {
    const res = await fetch(API.krim, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ oshpaz: selOshpaz.type, hodim: HODIM_ID, items: basket })
    });
    const raw = await res.json();
    const data = Array.isArray(raw) ? raw[0] : raw;
    if (data.ok || res.ok) {
      showToast('✅ Muvaffaqiyatli saqlandi!', 'success');
      resetKrim();
    } else { throw new Error('xato'); }
  } catch(e) {
    showToast('❌ Xato yuz berdi: ' + e.message, 'error');
  } finally {
    document.getElementById('savBtn').disabled = false;
    document.getElementById('savBtn').textContent = '✅ Tasdiqlash va saqlash';
  }
}

function resetKrim() {
  selOshpaz = null; basket = [];
  document.querySelectorAll('.oshpaz-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('krimForm').style.display = 'none';
  document.getElementById('selMahsulot').value = '';
  document.getElementById('inputMiqdor').value = '';
}

// OMBOR
async function loadOmbor() {
  document.getElementById('omborList').innerHTML = '<div class="loading"><div class="spinner"></div>Yuklanmoqda...</div>';
  try {
    const raw = await fetch(API.holat).then(r => r.json());
    omborData = parseResp(raw).ombor || [];
    renderOmborFilter();
    renderOmbor();
  } catch(e) {
    document.getElementById('omborList').innerHTML = '<div class="loading">Xato yuz berdi</div>';
  }
}

function renderOmborFilter() {
  const types = [...new Set(omborData.map(i=>i.oshpaz).filter(Boolean))];
  document.getElementById('omborFilter').innerHTML =
    '<div class="filter-chip active" onclick="filterOmbor(null,this)">Hammasi</div>' +
    types.map(t => `<div class="filter-chip" onclick="filterOmbor('${t}',this)">${t}</div>`).join('');
}

function filterOmbor(type, el) {
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  omborFilter = type;
  renderOmbor();
}

function renderOmbor() {
  const list = document.getElementById('omborList');
  const items = omborFilter ? omborData.filter(i => i.oshpaz === omborFilter) : omborData;
  if (!items.length) { list.innerHTML = '<div class="loading">Ma\'lumot yo\'q</div>'; return; }
  const grouped = {};
  items.forEach(i => { if (!grouped[i.oshpaz]) grouped[i.oshpaz] = []; grouped[i.oshpaz].push(i); });
  list.innerHTML = Object.entries(grouped).map(([oshpaz, rows]) => `
    <div class="ombor-card">
      <div class="ombor-header">${oshpaz}</div>
      ${rows.map(r => {
        const q = parseFloat(r.miqdor)||0;
        const dotClass = q>10?'dot-ok':q>3?'dot-warn':'dot-danger';
        return `<div class="ombor-item"><div class="ombor-dot ${dotClass}"></div><div class="ombor-name">${r.mahsulot}</div><span class="ombor-qty">${r.miqdor}</span><span class="ombor-unit">${r.birlik||''}</span></div>`;
      }).join('')}
    </div>
  `).join('');
}

// TARIXI
async function loadTarixiInit() {
  const sel = document.getElementById('tarixiOshpaz');
  if (sel.options.length < 2) {
    oshpazlar.forEach(o => { const opt = document.createElement('option'); opt.value = o.type; opt.textContent = o.ism; sel.appendChild(opt); });
  }
  loadTarixi();
}

async function loadTarixi() {
  document.getElementById('tarixiList').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  const oshpaz = document.getElementById('tarixiOshpaz').value;
  const sana = document.getElementById('tarixiSana').value;
  let url = API.tarixi;
  const p = new URLSearchParams();
  if (oshpaz) p.set('oshpaz', oshpaz);
  if (sana) p.set('sana', sana);
  if (p.toString()) url += '?' + p.toString();
  try {
    const raw = await fetch(url).then(r => r.json());
    const tarixi = parseResp(raw).tarixi || [];
    const sanas = [...new Set(tarixi.map(i=>i.sana).filter(Boolean))].sort().reverse();
    const sanaSel = document.getElementById('tarixiSana');
    const cur = sanaSel.value;
    sanaSel.innerHTML = '<option value="">Barcha sanalar</option>' + sanas.map(s=>`<option value="${s}"${s===cur?' selected':''}>${s}</option>`).join('');
    const grouped = {};
    tarixi.forEach(i => { const k=i.sana+'|'+i.oshpaz+'|'+i.hodim; if(!grouped[k])grouped[k]={sana:i.sana,oshpaz:i.oshpaz,hodim:i.hodim,items:[]}; grouped[k].items.push(i); });
    const list = document.getElementById('tarixiList');
    if (!Object.keys(grouped).length) { list.innerHTML = '<div class="loading">Ma\'lumot yo\'q</div>'; return; }
    list.innerHTML = Object.values(grouped).sort((a,b)=>b.sana.localeCompare(a.sana)).map(g => `
      <div class="tarixi-item">
        <div class="tarixi-head"><span class="tarixi-oshpaz">${g.oshpaz}</span><span class="tarixi-sana">${g.sana}</span></div>
        <div class="tarixi-hodim">Hodim: ${g.hodim}</div>
        <div class="tarixi-chips">${g.items.map(i=>`<span class="tarixi-chip">${i.mahsulot} — ${i.miqdor} ${i.birlik||''}</span>`).join('')}</div>
      </div>
    `).join('');
  } catch(e) {
    document.getElementById('tarixiList').innerHTML = '<div class="loading">Xato yuz berdi</div>';
  }
}

// TOAST
let toastTimer;
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

init();
</script>
