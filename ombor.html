<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ombor — AROS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',sans-serif;background:#f5f5f5;color:#1a1a1a;min-height:100vh;font-size:16px}

/* HEADER */
.hdr{background:#fff;border-bottom:2px solid #e8e8e8;padding:16px 18px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.hdr-title{font-size:18px;font-weight:800;flex:1;color:#111}
.aros{color:#22c55e;font-size:11px;font-weight:800;padding:4px 12px;border-radius:12px;letter-spacing:1px;border:2px solid #22c55e}

/* TABS */
.tabs{display:flex;background:#fff;border-bottom:2px solid #e8e8e8}
.tab{flex:1;padding:14px 4px 12px;text-align:center;font-size:12px;font-weight:700;color:#aaa;border-bottom:3px solid transparent;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:4px}
.tab.active{color:#3b82f6;border-bottom-color:#3b82f6}
.tab-ic{font-size:20px}
.page{display:none;padding:16px;animation:fi .2s ease}
.page.active{display:block}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* STEP BAR */
.steps{display:flex;align-items:center;padding:18px 16px 12px}
.sw{display:flex;align-items:center;flex:1}
.sw:last-child{flex:none}
.sc{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;transition:all .3s;border:2px solid #ddd}
.sc.done{background:#f0fdf4;border-color:#22c55e;color:#22c55e}
.sc.active{background:#eff6ff;border-color:#3b82f6;color:#3b82f6}
.sc.idle{background:#fff;border-color:#ddd;color:#bbb}
.sl{flex:1;height:2px;background:#e5e5e5;margin:0 8px;transition:background .3s;border-radius:2px}
.sl.done{background:#22c55e}
.step-labels{display:flex;justify-content:space-between;padding:0 16px 16px}
.slb{font-size:11px;font-weight:600;width:70px;text-align:center;transition:color .3s}
.slb.active{color:#3b82f6}
.slb.done{color:#22c55e}
.slb.idle{color:#bbb}

/* OSHPAZ PILLS */
.osh-scroll{display:flex;gap:10px;padding:4px 16px 18px;overflow-x:auto;scrollbar-width:none}
.osh-scroll::-webkit-scrollbar{display:none}
.osh-pill{flex-shrink:0;background:#fff;border:2px solid #e5e5e5;border-radius:50px;padding:10px 16px 10px 10px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .15s;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.osh-pill.sel{border-color:#3b82f6;background:#eff6ff}
.osh-pill:active{transform:scale(.97)}
.osh-av{width:36px;height:36px;border-radius:50%;background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#666;border:2px solid #e5e5e5;flex-shrink:0}
.osh-pill.sel .osh-av{border-color:#3b82f6;background:#dbeafe;color:#3b82f6}
.osh-nm{font-size:14px;font-weight:600;color:#333;white-space:nowrap}
.osh-pill.sel .osh-nm{color:#1d4ed8}
.osh-chk{width:20px;height:20px;border-radius:50%;background:#3b82f6;display:none;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:800;flex-shrink:0}
.osh-pill.sel .osh-chk{display:flex}

/* ADD FORM */
.sec-label{font-size:11px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.6px;padding:0 2px 12px}
.add-form{background:#fff;border:2px solid #22c55e33;border-radius:16px;padding:16px;margin-bottom:14px;box-shadow:0 1px 4px rgba(34,197,94,.08)}
.add-form-title{font-size:13px;font-weight:700;color:#22c55e;margin-bottom:14px;text-transform:uppercase;letter-spacing:.5px}
.form-row{display:flex;gap:9px;margin-bottom:10px}
.f-sel,.f-inp{background:#f8f8f8;border:1.5px solid #e5e5e5;border-radius:10px;color:#1a1a1a;padding:12px 14px;font-family:'Inter',sans-serif;font-size:14px;transition:border-color .15s}
.f-sel{flex:1}
.f-inp{width:90px;text-align:center}
.f-birlik{width:90px}
.f-sel:focus,.f-inp:focus{outline:none;border-color:#22c55e;background:#fff}
.add-btn{background:#22c55e;color:#fff;font-weight:700;font-size:14px;border:none;border-radius:10px;padding:12px 18px;cursor:pointer;white-space:nowrap;transition:all .15s;letter-spacing:.3px}
.add-btn:active{opacity:.85;transform:scale(.97)}

/* BASKET */
.basket{background:#fff;border:2px solid #e5e5e5;border-radius:16px;padding:16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.basket-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.basket-title{font-size:14px;font-weight:700;color:#333;display:flex;align-items:center;gap:8px}
.basket-cnt{background:#22c55e;color:#fff;font-size:11px;font-weight:800;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.basket-clear{font-size:12px;color:#ef4444;cursor:pointer;font-weight:600}
.basket-empty{font-size:14px;color:#bbb;text-align:center;padding:14px 0}
.b-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f0f0f0}
.b-row:last-child{border-bottom:none}
.b-dot{width:6px;height:6px;border-radius:50%;background:#22c55e;flex-shrink:0}
.b-name{flex:1;font-size:14px;font-weight:500;color:#333}
.b-qty{font-size:14px;font-weight:700;color:#22c55e}
.b-unit{font-size:11px;color:#aaa;margin-left:3px}
.b-del{color:#ddd;cursor:pointer;font-size:16px;padding:2px 6px;transition:color .15s}
.b-del:active{color:#ef4444}

/* BUTTONS */
.btn-next{width:100%;background:#fff;color:#22c55e;font-size:16px;font-weight:700;border:2px solid #22c55e;border-radius:14px;padding:16px;cursor:pointer;transition:all .15s;margin-bottom:10px}
.btn-next:hover{background:#f0fdf4}
.btn-next:active{transform:scale(.98)}
.btn-next:disabled{opacity:.3;cursor:not-allowed}
.btn-back{width:100%;background:#f5f5f5;color:#999;font-size:14px;font-weight:500;border:1.5px solid #e5e5e5;border-radius:14px;padding:14px;cursor:pointer}
.btn-save{width:100%;background:#22c55e;color:#fff;font-size:16px;font-weight:800;border:none;border-radius:14px;padding:16px;cursor:pointer;transition:all .15s;margin-bottom:10px;box-shadow:0 4px 14px rgba(34,197,94,.25)}
.btn-save:active{transform:scale(.98);opacity:.9}
.btn-save:disabled{opacity:.3;cursor:not-allowed;box-shadow:none}

/* CONFIRM */
.conf-box{background:#fff;border:2px solid #e5e5e5;border-radius:16px;padding:16px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.conf-osh{display:flex;align-items:center;gap:12px;padding-bottom:14px;border-bottom:1.5px solid #f0f0f0;margin-bottom:14px}
.conf-av{width:46px;height:46px;border-radius:50%;background:#eff6ff;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#3b82f6;border:2px solid #bfdbfe}
.conf-nm{font-size:16px;font-weight:700;color:#111}
.conf-tp{font-size:12px;color:#999;margin-top:2px}
.conf-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f5f5f5}
.conf-row:last-child{border-bottom:none}
.conf-dot{width:6px;height:6px;border-radius:50%;background:#22c55e;flex-shrink:0}
.conf-name{flex:1;font-size:14px;color:#444}
.conf-qty{font-size:15px;font-weight:700;color:#22c55e}
.conf-unit{font-size:11px;color:#aaa;margin-left:3px}

/* SUCCESS */
.succ-box{text-align:center;padding:48px 16px}
.succ-icon{font-size:64px;margin-bottom:16px;display:block;animation:pop .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}
.succ-title{font-size:22px;font-weight:800;color:#22c55e;margin-bottom:8px}
.succ-sub{font-size:14px;color:#999;margin-bottom:28px}
.btn-new{background:#fff;color:#22c55e;font-size:15px;font-weight:700;border:2px solid #22c55e;border-radius:14px;padding:14px 36px;cursor:pointer}

/* OMBOR */
.filter-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.fc{padding:8px 16px;border-radius:20px;font-size:12px;font-weight:700;border:2px solid #e5e5e5;background:#fff;color:#aaa;cursor:pointer;transition:all .15s}
.fc.active{border-color:#3b82f6;color:#3b82f6;background:#eff6ff}
.o-section{margin-bottom:14px}
.o-sec-hd{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.o-sec-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;flex-shrink:0}
.o-sec-nm{font-size:14px;font-weight:700;color:#333;flex:1}
.o-sec-ct{font-size:11px;color:#999;background:#f5f5f5;border:1px solid #e5e5e5;border-radius:8px;padding:3px 9px;font-weight:600}
.o-card{background:#fff;border:1.5px solid #e5e5e5;border-radius:14px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.o-row{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid #f5f5f5}
.o-row:last-child{border-bottom:none}
.o-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ok{background:#22c55e}.wrn{background:#eab308}.dng{background:#ef4444}
.o-name{flex:1;font-size:14px;color:#333;font-weight:500}
.o-qty{font-size:16px;font-weight:800;color:#22c55e}
.o-unit{font-size:11px;color:#aaa;margin-left:3px}
.refresh-btn{display:flex;align-items:center;justify-content:center;gap:7px;background:#fff;border:1.5px solid #e5e5e5;border-radius:12px;padding:12px;margin-top:10px;color:#aaa;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.refresh-btn:active{border-color:#22c55e;color:#22c55e}

/* TARIXI */
.t-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.t-stat{background:#fff;border:1.5px solid #e5e5e5;border-radius:14px;padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.t-stat-lbl{font-size:11px;color:#aaa;margin-bottom:4px;font-weight:600}
.t-stat-val{font-size:24px;font-weight:800;color:#22c55e}
.t-filters{display:flex;gap:8px;margin-bottom:14px}
.t-sel{flex:1;background:#fff;border:1.5px solid #e5e5e5;border-radius:10px;color:#333;padding:10px 12px;font-family:'Inter',sans-serif;font-size:13px}
.t-sel:focus{outline:none;border-color:#22c55e}
.t-card{background:#fff;border:1.5px solid #e5e5e5;border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.t-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.t-osh{font-size:14px;font-weight:700;color:#333}
.t-sana{font-size:11px;color:#aaa;background:#f5f5f5;border:1px solid #e5e5e5;padding:3px 8px;border-radius:7px;font-weight:600}
.t-hodim{font-size:12px;color:#bbb;margin-bottom:10px}
.t-chips{display:flex;flex-wrap:wrap;gap:6px}
.t-chip{background:#f5f5f5;border:1px solid #e5e5e5;border-radius:8px;padding:5px 10px;font-size:12px;color:#666;font-weight:500}

/* LOADING / EMPTY */
.loading{text-align:center;padding:40px 16px;color:#bbb;font-size:14px}
.spinner{width:30px;height:30px;border:2.5px solid #e5e5e5;border-top-color:#22c55e;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:48px 16px}
.empty-icon{font-size:42px;margin-bottom:12px}
.empty-txt{font-size:14px;color:#bbb}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);border-radius:14px;padding:12px 20px;font-size:13px;font-weight:600;z-index:999;transition:transform .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.12)}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.success{background:#f0fdf4;border:1.5px solid #22c55e;color:#16a34a}
.toast.error{background:#fef2f2;border:1.5px solid #ef4444;color:#dc2626}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-title">Ombor boshqaruvi</div>
  <div class="aros">AROS</div>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('krim',this)"><span class="tab-ic">📦</span>Krim</div>
  <div class="tab" onclick="showTab('ombor',this)"><span class="tab-ic">📊</span>Ombor</div>
  <div class="tab" onclick="showTab('tarixi',this)"><span class="tab-ic">📋</span>Tarixi</div>
</div>

<!-- KRIM -->
<div id="page-krim" class="page active">
  <div class="steps">
    <div class="sw"><div class="sc active" id="s1">1</div><div class="sl" id="sl1"></div></div>
    <div class="sw"><div class="sc idle" id="s2">2</div><div class="sl" id="sl2"></div></div>
    <div class="sc idle" id="s3">3</div>
  </div>
  <div class="step-labels">
    <span class="slb active" id="slb1">Oshpaz</span>
    <span class="slb idle" id="slb2">Mahsulot</span>
    <span class="slb idle" id="slb3">Tasdiqlash</span>
  </div>

  <div id="step1">
    <div class="sec-label">Oshpazni tanlang</div>
    <div class="osh-scroll" id="oshpazGrid">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </div>

  <div id="step2" style="display:none">
    <div class="add-form">
      <div class="add-form-title" id="addTitle">Mahsulot qo'shish</div>
      <div class="form-row">
        <select class="f-sel" id="selMahsulot">
          <option value="">— Mahsulot tanlang —</option>
        </select>
      </div>
      <div class="form-row">
        <input class="f-inp" id="inputMiqdor" type="number" min="0.1" step="0.1" placeholder="Miqdor">
        <select class="f-sel f-birlik" id="selBirlik">
          <option value="kg">kg</option>
          <option value="litr">litr</option>
          <option value="dona">dona</option>
          <option value="g">g</option>
          <option value="ml">ml</option>
          <option value="paket">paket</option>
          <option value="qop">qop</option>
        </select>
        <button class="add-btn" onclick="addToBasket()">+ Qo'sh</button>
      </div>
    </div>

    <div class="basket">
      <div class="basket-head">
        <div class="basket-title">Savatcha <span class="basket-cnt" id="bCnt">0</span></div>
        <span class="basket-clear" onclick="clearBasket()">Tozalash</span>
      </div>
      <div id="basketList"><div class="basket-empty">Hali hech narsa qo'shilmadi</div></div>
    </div>

    <button class="btn-next" id="btnNext" onclick="goStep3()" disabled>Davom etish →</button>
    <button class="btn-back" onclick="goStep1()">← Oshpazni o'zgartirish</button>
  </div>

  <div id="step3" style="display:none">
    <div class="conf-box" id="confBox"></div>
    <button class="btn-save" id="btnSave" onclick="saveKrim()">✓ Tasdiqlash va saqlash</button>
    <button class="btn-back" onclick="goStep2()">← Orqaga</button>
  </div>

  <div id="stepOk" style="display:none">
    <div class="succ-box">
      <span class="succ-icon">✅</span>
      <div class="succ-title">Saqlandi!</div>
      <div class="succ-sub" id="succSub"></div>
      <button class="btn-new" onclick="resetAll()">+ Yangi krim</button>
    </div>
  </div>
</div>

<!-- OMBOR -->
<div id="page-ombor" class="page">
  <div class="filter-row" id="omborFilter">
    <div class="fc active" onclick="filterOmbor(null,this)">Hammasi</div>
  </div>
  <div id="omborList"><div class="loading"><div class="spinner"></div>Yuklanmoqda...</div></div>
  <div class="refresh-btn" onclick="loadOmbor()">↻ Yangilash</div>
</div>

<!-- TARIXI -->
<div id="page-tarixi" class="page">
  <div class="t-stats">
    <div class="t-stat"><div class="t-stat-lbl">Jami krimlar</div><div class="t-stat-val" id="tTotal">—</div></div>
    <div class="t-stat"><div class="t-stat-lbl">So'nggi sana</div><div class="t-stat-val" style="font-size:15px;padding-top:6px" id="tLast">—</div></div>
  </div>
  <div class="t-filters">
    <select class="t-sel" id="tOshpaz" onchange="loadTarixi()"><option value="">Barcha oshpazlar</option></select>
    <select class="t-sel" id="tSana" onchange="loadTarixi()"><option value="">Barcha sanalar</option></select>
  </div>
  <div id="tarixiList"><div class="loading"><div class="spinner"></div></div></div>
</div>

<div class="toast" id="toast"></div>

<script>
const API={
  oshpazlar:'https://n8n.arosmarket.com/webhook/11f388db-4203-4a2a-ab05-01b8e8e2de3d',
  mahsulotlar:'https://n8n.arosmarket.com/webhook/02963f22-de91-4a1b-94bf-78817787d494',
  holat:'https://n8n.arosmarket.com/webhook/145e3667-3091-4554-8fba-f797741f5851',
  krim:'https://n8n.arosmarket.com/webhook/b5bf9585-cde0-4fe7-bc73-41666feda797',
  tarixi:'https://n8n.arosmarket.com/webhook/66c333f9-cbce-4b68-a76d-993ec2f2a734'
};
const HODIM_ID='inventory_user';
let oshpazlar=[],mahsulotlar=[],selOshpaz=null,basket=[];
let omborData=[],omborFil=null;
const parse=d=>Array.isArray(d)?d[0]:d;

function showTab(tab,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  el.classList.add('active');
  if(tab==='ombor')loadOmbor();
  if(tab==='tarixi')initTarixi();
}

async function init(){
  try{
    const[o,m]=await Promise.all([
      fetch(API.oshpazlar).then(r=>r.json()),
      fetch(API.mahsulotlar).then(r=>r.json())
    ]);
    oshpazlar=parse(o).oshpazlar||[];
    mahsulotlar=parse(m).mahsulotlar||[];
    renderOshpazlar();
    fillMahsulotSel();
  }catch(e){toast('Serverga ulanib bo\'lmadi','error');}
}

function setStep(n){
  [1,2,3].forEach(i=>{
    const c=document.getElementById('s'+i);
    const l=document.getElementById('sl'+i);
    const lb=document.getElementById('slb'+i);
    if(i<n){c.className='sc done';c.textContent='✓';if(l)l.classList.add('done');}
    else if(i===n){c.className='sc active';c.textContent=i;if(l)l.classList.remove('done');}
    else{c.className='sc idle';c.textContent=i;if(l)l.classList.remove('done');}
    lb.className='slb '+(i<n?'done':i===n?'active':'idle');
  });
  document.getElementById('step1').style.display=n===1?'block':'none';
  document.getElementById('step2').style.display=n===2?'block':'none';
  document.getElementById('step3').style.display=n===3?'block':'none';
  document.getElementById('stepOk').style.display='none';
}

function renderOshpazlar(){
  const g=document.getElementById('oshpazGrid');
  if(!oshpazlar.length){g.innerHTML='<div class="empty"><div class="empty-icon">👨‍🍳</div><div class="empty-txt">Oshpazlar topilmadi</div></div>';return;}
  g.innerHTML=oshpazlar.map(o=>{
    const ini=o.ism.split(' ').map(w=>w[0]||'').join('').substring(0,2).toUpperCase();
    const nm=o.ism.split(' ');
    const short=nm[0]+(nm[1]?' '+nm[1][0]+'.':'');
    return `<div class="osh-pill" onclick="selectOshpaz('${o.id}','${o.ism.replace(/'/g,"\\'")}','${o.type}',this)">
      <div class="osh-av">${ini}</div>
      <div class="osh-nm">${short}</div>
      <div class="osh-chk">✓</div>
    </div>`;
  }).join('');
}

function selectOshpaz(id,ism,type,el){
  document.querySelectorAll('.osh-pill').forEach(p=>p.classList.remove('sel'));
  el.classList.add('sel');
  selOshpaz={id,ism,type};
  basket=[];
  renderBasket();
  document.getElementById('addTitle').textContent=ism.split(' ')[0]+' uchun mahsulot qo\'shish';
  setStep(2);
}

function goStep1(){setStep(1);}
function goStep2(){setStep(2);}

function fillMahsulotSel(){
  const sel=document.getElementById('selMahsulot');
  sel.innerHTML='<option value="">— Mahsulot tanlang —</option>'+
    mahsulotlar.map(m=>`<option value="${m.mahsulot}" data-birlik="${m.birlik||'kg'}">${m.mahsulot}</option>`).join('');
  sel.onchange=function(){
    const opt=sel.options[sel.selectedIndex];
    const b=opt.dataset.birlik||'kg';
    const bs=document.getElementById('selBirlik');
    for(let i=0;i<bs.options.length;i++){if(bs.options[i].value===b){bs.selectedIndex=i;break;}}
  };
}

function addToBasket(){
  const mahsulot=document.getElementById('selMahsulot').value;
  const miqdor=parseFloat(document.getElementById('inputMiqdor').value);
  const birlik=document.getElementById('selBirlik').value;
  if(!mahsulot){toast('Mahsulot tanlang','error');return;}
  if(!miqdor||miqdor<=0){toast('Miqdor kiriting','error');return;}
  const idx=basket.findIndex(b=>b.mahsulot===mahsulot&&b.birlik===birlik);
  if(idx>=0)basket[idx].miqdor=Math.round((basket[idx].miqdor+miqdor)*100)/100;
  else basket.push({mahsulot,miqdor,birlik});
  document.getElementById('selMahsulot').value='';
  document.getElementById('inputMiqdor').value='';
  renderBasket();
  toast(mahsulot+' qo\'shildi','success');
}

function removeFromBasket(i){basket.splice(i,1);renderBasket();}
function clearBasket(){basket=[];renderBasket();}

function renderBasket(){
  document.getElementById('bCnt').textContent=basket.length;
  document.getElementById('btnNext').disabled=basket.length===0;
  const list=document.getElementById('basketList');
  if(!basket.length){list.innerHTML='<div class="basket-empty">Hali hech narsa qo\'shilmadi</div>';return;}
  list.innerHTML=basket.map((b,i)=>`
    <div class="b-row">
      <div class="b-dot"></div>
      <div class="b-name">${b.mahsulot}</div>
      <div class="b-qty">${b.miqdor}</div>
      <div class="b-unit">${b.birlik}</div>
      <div class="b-del" onclick="removeFromBasket(${i})">✕</div>
    </div>
  `).join('');
}

function goStep3(){
  if(!basket.length)return;
  const ini=selOshpaz.ism.split(' ').map(w=>w[0]||'').join('').substring(0,2).toUpperCase();
  document.getElementById('confBox').innerHTML=`
    <div class="conf-osh">
      <div class="conf-av">${ini}</div>
      <div><div class="conf-nm">${selOshpaz.ism}</div><div class="conf-tp">${selOshpaz.type}</div></div>
    </div>
    ${basket.map(b=>`<div class="conf-row"><div class="conf-dot"></div><div class="conf-name">${b.mahsulot}</div><span class="conf-qty">${b.miqdor}</span><span class="conf-unit">${b.birlik}</span></div>`).join('')}
  `;
  setStep(3);
}

async function saveKrim(){
  const btn=document.getElementById('btnSave');
  btn.disabled=true;btn.textContent='Saqlanmoqda...';
  try{
    const res=await fetch(API.krim,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({oshpaz:selOshpaz.type,hodim:HODIM_ID,items:basket})});
    if(res.ok){
      document.getElementById('step3').style.display='none';
      document.getElementById('stepOk').style.display='block';
      document.getElementById('succSub').textContent=selOshpaz.ism+' uchun '+basket.length+' ta mahsulot saqlandi';
      [1,2,3].forEach(i=>{
        document.getElementById('s'+i).className='sc done';
        document.getElementById('s'+i).textContent='✓';
        const l=document.getElementById('sl'+i);if(l)l.classList.add('done');
        document.getElementById('slb'+i).className='slb done';
      });
    }else throw new Error(res.status);
  }catch(e){toast('Xato: '+e.message,'error');btn.disabled=false;btn.textContent='✓ Tasdiqlash va saqlash';}
}

function resetAll(){
  selOshpaz=null;basket=[];
  document.querySelectorAll('.osh-pill').forEach(p=>p.classList.remove('sel'));
  document.getElementById('stepOk').style.display='none';
  setStep(1);
}

async function loadOmbor(){
  document.getElementById('omborList').innerHTML='<div class="loading"><div class="spinner"></div>Yuklanmoqda...</div>';
  try{
    const raw=await fetch(API.holat).then(r=>r.json());
    omborData=parse(raw).ombor||[];
    buildOmborFilter();renderOmbor();
  }catch(e){document.getElementById('omborList').innerHTML='<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-txt">Xato yuz berdi</div></div>';}
}

function buildOmborFilter(){
  const types=[...new Set(omborData.map(i=>i.oshpaz).filter(Boolean))];
  const om={};oshpazlar.forEach(o=>{om[o.type]=o.ism;});
  document.getElementById('omborFilter').innerHTML=
    '<div class="fc active" onclick="filterOmbor(null,this)">Hammasi</div>'+
    types.map(t=>`<div class="fc" onclick="filterOmbor('${t}',this)">${om[t]?om[t].split(' ')[0]:t}</div>`).join('');
}

function filterOmbor(type,el){
  document.querySelectorAll('.fc').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');omborFil=type;renderOmbor();
}

function renderOmbor(){
  const list=document.getElementById('omborList');
  const allItems=omborFil?omborData.filter(i=>i.oshpaz===omborFil):omborData;
  const items=allItems.filter(i=>i.mahsulot&&i.oshpaz&&String(i.mahsulot).trim()!==''&&String(i.oshpaz).trim()!==''&&i.mahsulot!=='mahsulot');
  if(!items.length){list.innerHTML='<div class="empty"><div class="empty-icon">📦</div><div class="empty-txt">Ombor bo\'sh</div></div>';return;}
  const om={};oshpazlar.forEach(o=>{om[o.type]=o.ism;});
  const grouped={};
  items.forEach(i=>{if(!grouped[i.oshpaz])grouped[i.oshpaz]=[];grouped[i.oshpaz].push(i);});
  list.innerHTML=Object.entries(grouped).map(([oshpaz,rows])=>`
    <div class="o-section">
      <div class="o-sec-hd">
        <div class="o-sec-dot"></div>
        <div class="o-sec-nm">${om[oshpaz]||oshpaz}</div>
        <div class="o-sec-ct">${rows.length} ta</div>
      </div>
      <div class="o-card">
        ${rows.map(r=>{const q=parseFloat(r.miqdor)||0;const cls=q>10?'ok':q>3?'wrn':'dng';return`<div class="o-row"><div class="o-dot ${cls}"></div><div class="o-name">${r.mahsulot}</div><span class="o-qty">${r.miqdor}</span><span class="o-unit">${r.birlik||''}</span></div>`;}).join('')}
      </div>
    </div>
  `).join('');
}

async function initTarixi(){
  const sel=document.getElementById('tOshpaz');
  if(sel.options.length<2)oshpazlar.forEach(o=>{const opt=document.createElement('option');opt.value=o.type;opt.textContent=o.ism;sel.appendChild(opt);});
  loadTarixi();
}

async function loadTarixi(){
  document.getElementById('tarixiList').innerHTML='<div class="loading"><div class="spinner"></div></div>';
  const oshpaz=document.getElementById('tOshpaz').value;
  const sana=document.getElementById('tSana').value;
  let url=API.tarixi;
  const p=new URLSearchParams();
  if(oshpaz)p.set('oshpaz',oshpaz);
  if(sana)p.set('sana',sana);
  if(p.toString())url+='?'+p.toString();
  try{
    const raw=await fetch(url).then(r=>r.json());
    const tarixi=parse(raw).tarixi||[];
    const om={};oshpazlar.forEach(o=>{om[o.type]=o.ism;});
    const sanas=[...new Set(tarixi.map(i=>i.sana).filter(Boolean))].sort().reverse();
    const sanaSel=document.getElementById('tSana');
    const cur=sanaSel.value;
    sanaSel.innerHTML='<option value="">Barcha sanalar</option>'+sanas.map(s=>`<option value="${s}"${s===cur?' selected':''}>${s}</option>`).join('');
    document.getElementById('tTotal').textContent=tarixi.length;
    document.getElementById('tLast').textContent=sanas[0]||'—';
    const grouped={};
    tarixi.forEach(i=>{const k=i.sana+'|'+i.oshpaz;if(!grouped[k])grouped[k]={sana:i.sana,oshpaz:i.oshpaz,hodim:i.hodim,items:[]};grouped[k].items.push(i);});
    const list=document.getElementById('tarixiList');
    if(!Object.keys(grouped).length){list.innerHTML='<div class="empty"><div class="empty-icon">📋</div><div class="empty-txt">Yozuvlar yo\'q</div></div>';return;}
    list.innerHTML=Object.values(grouped).sort((a,b)=>b.sana.localeCompare(a.sana)).map(g=>`
      <div class="t-card">
        <div class="t-head"><span class="t-osh">${om[g.oshpaz]||g.oshpaz}</span><span class="t-sana">${g.sana}</span></div>
        <div class="t-hodim">Hodim: ${g.hodim||'—'}</div>
        <div class="t-chips">${g.items.map(i=>`<span class="t-chip">${i.mahsulot} — ${i.miqdor} ${i.birlik||''}</span>`).join('')}</div>
      </div>
    `).join('');
  }catch(e){document.getElementById('tarixiList').innerHTML='<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-txt">Xato yuz berdi</div></div>';}
}

let toastTm;
function toast(msg,type='success'){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast show '+type;
  clearTimeout(toastTm);
  toastTm=setTimeout(()=>t.classList.remove('show'),2500);
}

init();
</script>
</body>
</html>
